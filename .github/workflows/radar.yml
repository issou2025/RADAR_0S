name: Client Radar OS

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests python-dateutil feedparser beautifulsoup4

      - name: Run radar
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          FREELANCER_TOKEN: ${{ secrets.FREELANCER_TOKEN }}
        run: |
          python scripts/main.py

      - name: Commit updated files
        run: |
          git config user.name "client-radar-os"
          git config user.email "client-radar-os@example.com"
          git add data/*.json public/offers/*.html reports/**/*.md proposals/*.md
          git commit -m "Update client radar data" || echo "No changes to commit"
          git push
